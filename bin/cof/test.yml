logs:
  - name: root
    level: info
    formatter: "%d%T%m%n"
    appenders:
      - type: FileoutLogAppender
        file: log.txt
      - type: StdoutLogAppender
  - name: system
    level: debug
    formatter: "%d%T%m%n"
    appenders:
      - type: FileLogAppender
        file: log.txt
      - type: StdoutLogAppender
system:
    port : 9900
    value : 15
    int_vec : [10,20,30,40]
    int_lis : [10,20,30,50]
    int_set : [10,30,20,10] # 转为set会被去重输出[10,20,30]
    int_unordered_set : [10,30,20,10] # 去重后输出无序
    str_int_map :
      first : 10
      second : 20
      third : 30
      fourth : 40
    str_int_unordered_map :
      k1 : 4
      k2 : 5
      k3 : 6
      k4 : 7
