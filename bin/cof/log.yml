logs:
  - name: root
    level: info
    formatter: "%d{%Y-%m-%d %H:%M:%S}%T%t%T%F%T[%p]%T[%c]%T%f:%l%T%m%n"
    appenders:
      - name : file
        type: FileoutLogAppender
        file: /home/blue/c_projects/sylar/build/root.txt
        level: INFO
        formatter: "%d{%Y-%m-%d %H:%M:%S}%T[%p]%T%m%n"
      - name : console
        type: StdoutLogAppender
        level: INFO
        formatter: "%d{%Y-%m-%d %H:%M:%S}%T[%p]%T%m%n"


  - name: system
    level: DEBUG
    formatter: "%d{%Y-%m-%d %H:%M:%S}%T[%p]%T%m%n"
    appenders:
      - name : file
        type: FileoutLogAppender
        file: /home/blue/c_projects/sylar/build/system.txt
        level: debug
        formatter : "%d{%Y-%m-%d %H:%M:%S}%T[%p]%T%f:%l%T%m%n"
      - name : console
        type: StdoutLogAppender
        level: debug
